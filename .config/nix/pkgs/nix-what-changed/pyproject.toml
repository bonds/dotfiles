[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "what-changed"
version = "0.7.0"
description = "Show nix system package changelogs using LLM"
requires-python = ">=3.10"
dependencies = ["rich", "httpx"]

[project.scripts]
what-changed = "what_changed.cli:entry"

[tool.setuptools.packages.find]
include = ["what_changed*"]
