# Truecolor support
set -g default-terminal "tmux-256color"
set -ag terminal-features "xterm-256color:truecolor"

# Mouse support
set -g mouse on

# Default prefix (C-b)
set -g prefix C-b

# Vim-style keybindings
set -g mode-keys vi
set -g status-keys vi

# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1

# History limit
set -g history-limit 10000

# Easier splits
bind | split-window -h
bind - split-window -v

# Vim movement between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Escape delay
set -sg escape-time 0

# Easier reload
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Catppuccin theme — frappe, rounded windows
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"

# Load plugins
if-shell "test -f ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux" {
    run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
}
if-shell "test -f ~/.config/tmux/plugins/tmux-cpu/cpu.tmux" {
    run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux
}
if-shell "test -f ~/.config/tmux/plugins/tmux-battery/battery.tmux" {
    run ~/.config/tmux/plugins/tmux-battery/battery.tmux
}

# Status line with modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"
