# Truecolor support
set -g default-terminal "tmux-256color"
set -ag terminal-features "xterm-256color:truecolor"

# Mouse support
set -g mouse on

# Status bar — matching starship colors
set -g status-bg colour236
set -g status-fg white
set -g status-left '#[fg=colour236,bg=cyan] #S #[fg=red,bg=colour236] #h '
set -g status-right '#[fg=yellow] %Y-%m-%d %H:%M '
setw -g window-status-current-format '#[fg=colour236,bg=green] #I:#W '
setw -g window-status-format '#[fg=white] #I:#W '
set -g window-status-separator ''

# Default prefix (C-b)
set -g prefix C-b

# Easier reload
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Vim-style keybindings
set -g mode-keys vi
set -g status-keys vi

# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1

# History limit
set -g history-limit 10000

# Easier splits
bind | split-window -h
bind - split-window -v

# Vim movement between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Escape delay
set -sg escape-time 0
